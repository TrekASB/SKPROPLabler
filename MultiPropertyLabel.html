<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <title>Minimap – Trimble Connect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
  <style>
    :root{--primary:#0069d9;--bg:#1a1f2e;--panel:#222840;--border:#2e3650;--text:#e8eaf0;--muted:#7b82a0;--accent:#00d4ff;--danger:#ff5252;--success:#4caf50;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
    *{box-sizing:border-box;margin:0;padding:0} body{background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
    header{height:28px;display:flex;align-items:center;justify-content:space-between;padding:5px 9px;background:var(--panel);border-bottom:1px solid var(--border);gap:8px;flex:0 0 auto}
    .title-group{display:flex;align-items:center;gap:7px}.title{font-size:12px;font-weight:900;letter-spacing:.05em;color:var(--accent);text-transform:uppercase}.status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}.status-dot.live{background:var(--success);box-shadow:0 0 6px var(--success)}.status-dot.error{background:var(--danger)}
    .map-wrap{flex:1;position:relative;overflow:hidden} #mapCanvas{display:block;width:100%;height:100%;cursor:crosshair}
    .model-panel{position:absolute;top:10px;left:10px;width:min(390px,calc(100% - 86px));background:rgba(34,40,64,.96);border:1px solid var(--border);border-radius:10px;padding:8px;display:grid;grid-template-columns:1fr auto auto;gap:6px;z-index:5;box-shadow:0 8px 24px rgba(0,0,0,.25)}
    #modelSelector{min-width:0;background:#171c2b;color:var(--text);border:1px solid var(--border);border-radius:7px;padding:6px 8px;font-size:11px;outline:none}.mini-btn{border:1px solid var(--border);background:#171c2b;color:var(--text);border-radius:7px;padding:0 9px;font-size:11px;font-weight:800;cursor:pointer}.mini-btn:hover{background:var(--primary);color:#fff}.filter-row{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:10px;color:var(--muted)}.filter-row label{display:flex;align-items:center;gap:4px;white-space:nowrap}.filter-row input{accent-color:var(--accent)}#modelCount{margin-left:auto;font-weight:800;color:var(--muted)}
    .level-badge{position:absolute;top:10px;right:58px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:800;color:var(--accent);z-index:4}.controls{position:absolute;right:10px;bottom:10px;display:flex;flex-direction:column;gap:4px;z-index:4}.ctrl-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:14px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center}.ctrl-btn:hover{background:var(--primary);color:#fff}
    #compass{position:absolute;top:10px;right:10px;width:40px;height:40px;pointer-events:none;z-index:4}.info-bar{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--panel);border-top:1px solid var(--border);flex:0 0 auto}.info-cell{display:flex;flex-direction:column;align-items:center;padding:6px 8px;border-right:1px solid var(--border)}.info-cell:last-child{border-right:none}.info-label{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}.info-value{font-size:13px;font-weight:900;font-variant-numeric:tabular-nums;color:var(--accent);margin-top:1px}
    #overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(26,31,46,.84);gap:10px;font-size:12px;color:var(--muted);text-align:center;padding:20px;z-index:3}.hidden{display:none!important}.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<header>
  <div class="title-group"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg><span class="title">Minimap</span></div>
  <div style="display:flex;align-items:center;gap:6px"><span id="statusText" style="font-size:11px;color:var(--muted)">Kobler til…</span><div class="status-dot" id="statusDot"></div></div>
</header>
<div class="map-wrap">
  <canvas id="mapCanvas"></canvas>
  <div class="model-panel">
    <select id="modelSelector"><option value="__all__">Laster modeller…</option></select>
    <button class="mini-btn" id="refreshModels" title="Hent modeller på nytt">↻</button>
    <button class="mini-btn" id="zoomModel" title="Zoom til valgt modell i minikartet">Zoom</button>
    <div class="filter-row">
      <label><input type="checkbox" id="showModels" checked> Vis modeller i kart</label>
      <label><input type="checkbox" id="selectedOnly"> Kun valgt modell</label>
      <span id="modelCount">0 filer</span>
    </div>
  </div>
  <svg id="compass" viewBox="0 0 48 48"><circle cx="24" cy="24" r="22" fill="#1a1f2e" stroke="#2e3650" stroke-width="1.5"/><polygon id="compassNeedle" points="24,5 27,24 24,20 21,24" fill="var(--accent)" opacity=".9"/><polygon id="compassNeedleS" points="24,43 21,24 24,28 27,24" fill="var(--muted)" opacity=".6"/><text x="24" y="14" text-anchor="middle" font-size="6" font-weight="900" fill="var(--accent)" font-family="system-ui">N</text></svg>
  <div class="level-badge" id="levelBadge">Z: –</div>
  <div class="controls"><button class="ctrl-btn" id="zoomIn">+</button><button class="ctrl-btn" id="zoomOut">−</button><button class="ctrl-btn" id="resetView">⊙</button></div>
  <div id="overlay"><div class="spinner"></div><span id="overlayText">Venter på modeller/kamera<br>fra Trimble Connect…</span></div>
</div>
<div class="info-bar"><div class="info-cell"><span class="info-label">X (øst)</span><span class="info-value" id="valX">–</span></div><div class="info-cell"><span class="info-label">Y (nord)</span><span class="info-value" id="valY">–</span></div><div class="info-cell"><span class="info-label">Retning</span><span class="info-value" id="valDir">–°</span></div></div>
<script>
let API=null;
let camPos={x:0,y:0,z:0}, camDir={x:0,y:1,z:0}, hasCamera=false;
let scale=1, offsetX=0, offsetY=0, autoFit=true;
let cameraBounds={minX:Infinity,maxX:-Infinity,minY:Infinity,maxY:-Infinity};
let projectBounds={minX:Infinity,maxX:-Infinity,minY:Infinity,maxY:-Infinity};
let models2d=[], selectedModelId="__all__", showModels=true, selectedOnly=false;
const trail=[], MAX_TRAIL=200;
const canvas=document.getElementById('mapCanvas'), ctx=canvas.getContext('2d'), overlay=document.getElementById('overlay');

function setStatus(type,text){document.getElementById('statusDot').className='status-dot'+(type?' '+type:'');document.getElementById('statusText').textContent=text;}
function validBounds(b){return b&&isFinite(b.minX)&&isFinite(b.maxX)&&isFinite(b.minY)&&isFinite(b.maxY)&&b.maxX>b.minX&&b.maxY>b.minY;}
function mergeBounds(a,b){if(!validBounds(b))return;a.minX=Math.min(a.minX,b.minX);a.maxX=Math.max(a.maxX,b.maxX);a.minY=Math.min(a.minY,b.minY);a.maxY=Math.max(a.maxY,b.maxY);}
function activeBounds(){if(showModels&&selectedOnly&&selectedModelId!=='__all__'){const m=models2d.find(x=>x.id===selectedModelId);if(validBounds(m?.bounds))return m.bounds;} if(showModels&&validBounds(projectBounds))return projectBounds; if(validBounds(cameraBounds))return cameraBounds; return null;}
function fitView(bounds=activeBounds()){if(!validBounds(bounds))return;const pad=70,W=Math.max(10,canvas.width-pad*2),H=Math.max(10,canvas.height-pad*2);const mW=bounds.maxX-bounds.minX,mH=bounds.maxY-bounds.minY;scale=Math.min(W/mW,H/mH);if(!isFinite(scale)||scale<=0)scale=1;scale=Math.min(scale,250);offsetX=canvas.width/2-((bounds.minX+bounds.maxX)/2)*scale;offsetY=canvas.height/2+((bounds.minY+bounds.maxY)/2)*scale;}
function toCanvas(wx,wy){return{cx:wx*scale+offsetX,cy:-wy*scale+offsetY};}
function resize(){canvas.width=canvas.clientWidth;canvas.height=canvas.clientHeight;if(autoFit)fitView();draw();} new ResizeObserver(resize).observe(canvas);

function draw(){const W=canvas.width,H=canvas.height;ctx.clearRect(0,0,W,H);ctx.fillStyle='#12151f';ctx.fillRect(0,0,W,H);drawGrid(W,H);if(showModels)drawModels();drawTrail();if(hasCamera){const p=toCanvas(camPos.x,camPos.y);drawFOV(p.cx,p.cy);drawCameraIcon(p.cx,p.cy);} }
function drawGrid(W,H){const raw=80/Math.max(scale,.000001);const exp=Math.floor(Math.log10(raw));let step=Math.pow(10,exp+1);for(const n of [1,2,5,10]){const c=n*Math.pow(10,exp);if(c*scale>=40){step=c;break;}}ctx.strokeStyle='rgba(0,212,255,.07)';ctx.lineWidth=1;const startX=Math.floor((-offsetX/scale)/step)*step;for(let wx=startX;wx<(W-offsetX)/scale;wx+=step){const x=wx*scale+offsetX;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}const startY=Math.floor(((offsetY-H)/scale)/step)*step;for(let wy=startY;wy<offsetY/scale;wy+=step){const y=-wy*scale+offsetY;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}const o=toCanvas(0,0);ctx.strokeStyle='rgba(0,212,255,.18)';ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(o.cx,0);ctx.lineTo(o.cx,H);ctx.stroke();ctx.beginPath();ctx.moveTo(0,o.cy);ctx.lineTo(W,o.cy);ctx.stroke();ctx.setLineDash([]);}
function drawModels(){const list=selectedOnly&&selectedModelId!=='__all__'?models2d.filter(m=>m.id===selectedModelId):models2d;for(let i=0;i<list.length;i++){const m=list[i];if(!validBounds(m.bounds))continue;const a=toCanvas(m.bounds.minX,m.bounds.minY), b=toCanvas(m.bounds.maxX,m.bounds.maxY);const x=Math.min(a.cx,b.cx),y=Math.min(a.cy,b.cy),w=Math.abs(b.cx-a.cx),h=Math.abs(b.cy-a.cy);const isSel=m.id===selectedModelId;ctx.save();ctx.strokeStyle=isSel?'rgba(0,212,255,.95)':'rgba(0,212,255,.42)';ctx.fillStyle=isSel?'rgba(0,212,255,.13)':'rgba(0,212,255,.055)';ctx.lineWidth=isSel?2:1;ctx.setLineDash(isSel?[]:[6,4]);ctx.beginPath();ctx.rect(x,y,Math.max(w,4),Math.max(h,4));ctx.fill();ctx.stroke();ctx.setLineDash([]);if(w>40&&h>14){ctx.fillStyle='rgba(232,234,240,.78)';ctx.font='10px system-ui';ctx.fillText(shortName(m.name),x+5,y+13);}ctx.restore();}}
function shortName(n){return String(n||'Modell').replace(/\.[^.]+$/,'').slice(0,38);}
function drawTrail(){if(trail.length<2)return;ctx.beginPath();let p=toCanvas(trail[0].x,trail[0].y);ctx.moveTo(p.cx,p.cy);for(let i=1;i<trail.length;i++){p=toCanvas(trail[i].x,trail[i].y);ctx.lineTo(p.cx,p.cy);}ctx.strokeStyle='rgba(0,212,255,.30)';ctx.lineWidth=1.5;ctx.stroke();}
function drawFOV(px,py){const heading=Math.atan2(camDir.x,camDir.y), fov=Math.PI/3, len=60;const v=a=>({dx:Math.sin(a),dy:-Math.cos(a)}), l=v(heading-fov/2), r=v(heading+fov/2), b=v(heading);ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+l.dx*len,py+l.dy*len);ctx.arc(px,py,len,Math.atan2(l.dy,l.dx),Math.atan2(r.dy,r.dx));ctx.closePath();const g=ctx.createRadialGradient(px,py,0,px,py,len);g.addColorStop(0,'rgba(0,212,255,.35)');g.addColorStop(1,'rgba(0,212,255,0)');ctx.fillStyle=g;ctx.fill();ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+b.dx*len*.85,py+b.dy*len*.85);ctx.strokeStyle='rgba(0,212,255,.7)';ctx.lineWidth=1.5;ctx.stroke();}
function drawCameraIcon(px,py){ctx.save();ctx.translate(px,py);ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fillStyle='#12151f';ctx.fill();ctx.strokeStyle='rgba(0,212,255,.85)';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#00d4ff';ctx.fillRect(-5,-2,10,6);ctx.beginPath();ctx.moveTo(3,-2);ctx.lineTo(7,-5);ctx.lineTo(7,7);ctx.lineTo(3,4);ctx.closePath();ctx.fill();ctx.beginPath();ctx.arc(0,1,2,0,Math.PI*2);ctx.fillStyle='#12151f';ctx.fill();ctx.restore();}
function updateCompass(){const h=Math.atan2(camDir.x,camDir.y)*180/Math.PI;document.getElementById('compassNeedle').setAttribute('transform',`rotate(${h}, 24, 24)`);document.getElementById('compassNeedleS').setAttribute('transform',`rotate(${h}, 24, 24)`);} 
function updateInfo(){document.getElementById('valX').textContent=hasCamera?camPos.x.toFixed(1):'–';document.getElementById('valY').textContent=hasCamera?camPos.y.toFixed(1):'–';const deg=((Math.atan2(camDir.x,camDir.y)*180/Math.PI)+360)%360;document.getElementById('valDir').textContent=hasCamera?deg.toFixed(0)+'°':'–°';document.getElementById('levelBadge').textContent=hasCamera?`Z: ${camPos.z.toFixed(1)} m`:'Z: –';}
function onCameraUpdate(position,direction){if(!position)return;camPos={x:Number(position.x??0),y:Number(position.y??0),z:Number(position.z??0)};if(direction){camDir={x:Number(direction.x??0),y:Number(direction.y??1),z:Number(direction.z??0)};const l=Math.hypot(camDir.x,camDir.y,camDir.z)||1;camDir.x/=l;camDir.y/=l;camDir.z/=l;}hasCamera=true;mergeBounds(cameraBounds,{minX:camPos.x-5,maxX:camPos.x+5,minY:camPos.y-5,maxY:camPos.y+5});trail.push({x:camPos.x,y:camPos.y});if(trail.length>MAX_TRAIL)trail.shift();overlay.classList.add('hidden');if(autoFit&&!validBounds(projectBounds))fitView(cameraBounds);updateInfo();updateCompass();draw();setStatus('live','Live');}
function vectorFromTo(from,to){if(!from||!to)return null;return{x:(to.x??0)-(from.x??0),y:(to.y??0)-(from.y??0),z:(to.z??0)-(from.z??0)};}

async function tryCalls(calls){for(const fn of calls){try{const v=await fn();if(v!==undefined&&v!==null)return v;}catch(e){console.warn('Minimap API-forsøk feilet:',e?.message||e);}}return null;}
function asArray(v){if(!v)return[];if(Array.isArray(v))return v;if(Array.isArray(v.models))return v.models;if(Array.isArray(v.data))return v.data;if(Array.isArray(v.items))return v.items;if(Array.isArray(v.files))return v.files;return[];}
function normaliseBounds(raw){if(!raw)return null;const min=raw.min||raw.minimum||raw.low||raw.Min||raw.minPoint;const max=raw.max||raw.maximum||raw.high||raw.Max||raw.maxPoint;if(min&&max)return{minX:Number(min.x??min.X??min[0]),maxX:Number(max.x??max.X??max[0]),minY:Number(min.y??min.Y??min[1]),maxY:Number(max.y??max.Y??max[1])};if(['minX','maxX','minY','maxY'].every(k=>raw[k]!==undefined))return{minX:Number(raw.minX),maxX:Number(raw.maxX),minY:Number(raw.minY),maxY:Number(raw.maxY)};if(raw.boundingBox)return normaliseBounds(raw.boundingBox);if(raw.bbox)return normaliseBounds(raw.bbox);if(raw.bounds)return normaliseBounds(raw.bounds);return null;}
function modelId(m){return String(m.id??m.modelId??m.fileId??m.documentId??m.guid??m.name??Math.random());}
function modelName(m){return String(m.name??m.fileName??m.displayName??m.title??m.modelName??modelId(m));}
async function getModelBounds(id,raw){let b=normaliseBounds(raw);if(validBounds(b))return b;const r=await tryCalls([
  ()=>API.viewer?.getModelBoundingBox?.(id),
  ()=>API.viewer?.getModelBounds?.(id),
  ()=>API.viewer?.getObjectBoundingBox?.(id),
  ()=>API.viewer?.getObjectsBoundingBox?.([id]),
  ()=>API.viewer?.getBoundingBox?.(id),
  ()=>API.viewer?.getBounds?.(id),
  ()=>API.models?.getModelBoundingBox?.(id),
  ()=>API.models?.getBoundingBox?.(id)
]);return normaliseBounds(r);}
async function loadModels(){const sel=document.getElementById('modelSelector');sel.innerHTML='<option value="__all__">Henter modeller…</option>';setStatus('', 'Henter modeller…');const raw=await tryCalls([
  ()=>API.viewer?.getModels?.(),
  ()=>API.viewer?.getLoadedModels?.(),
  ()=>API.viewer?.getModelState?.(),
  ()=>API.viewer?.getModelsState?.(),
  ()=>API.models?.getModels?.(),
  ()=>API.project?.getModels?.()
]);const arr=asArray(raw);models2d=[];projectBounds={minX:Infinity,maxX:-Infinity,minY:Infinity,maxY:-Infinity};for(const m of arr){const id=modelId(m), name=modelName(m);const bounds=await getModelBounds(id,m);models2d.push({id,name,bounds});mergeBounds(projectBounds,bounds);}sel.innerHTML='';const all=document.createElement('option');all.value='__all__';all.textContent='Alle modeller';sel.appendChild(all);for(const m of models2d){const opt=document.createElement('option');opt.value=m.id;opt.textContent=validBounds(m.bounds)?m.name:`${m.name} (mangler 2D bbox)`;sel.appendChild(opt);}document.getElementById('modelCount').textContent=`${models2d.length} filer`;overlay.classList.add('hidden');if(models2d.length===0){setStatus('error','Fant ingen modeller');document.getElementById('overlayText').innerHTML='Fant ingen modeller via API.<br>Prøv ↻ etter at modellene er lastet.';overlay.classList.remove('hidden');}else if(!validBounds(projectBounds)){setStatus('error','Mangler bbox');document.getElementById('overlayText').innerHTML='Modeller funnet, men API returnerte ikke bounding box.<br>Minikartet kan derfor ikke tegne/zoome modellene.';overlay.classList.remove('hidden');}else{setStatus('live','Modeller lastet');autoFit=true;fitView(projectBounds);}draw();console.log('Minimap models2d:',models2d,'projectBounds:',projectBounds);}
function zoomToSelectedModel(){let b=null;if(selectedModelId==='__all__')b=projectBounds;else b=models2d.find(m=>m.id===selectedModelId)?.bounds;if(validBounds(b)){autoFit=false;fitView(b);draw();}else{setStatus('error','Ingen bbox for valgt modell');}}

document.getElementById('modelSelector').addEventListener('change',e=>{selectedModelId=e.target.value;if(selectedOnly)zoomToSelectedModel();else draw();});
document.getElementById('showModels').addEventListener('change',e=>{showModels=e.target.checked;draw();});
document.getElementById('selectedOnly').addEventListener('change',e=>{selectedOnly=e.target.checked;if(selectedOnly&&selectedModelId!=='__all__')zoomToSelectedModel();else draw();});
document.getElementById('zoomModel').addEventListener('click',zoomToSelectedModel);document.getElementById('refreshModels').addEventListener('click',()=>loadModels());

let dragging=false,dragX0=0,dragY0=0,off0X=0,off0Y=0;canvas.addEventListener('mousedown',e=>{dragging=true;autoFit=false;dragX0=e.clientX;dragY0=e.clientY;off0X=offsetX;off0Y=offsetY});window.addEventListener('mousemove',e=>{if(!dragging)return;offsetX=off0X+(e.clientX-dragX0);offsetY=off0Y+(e.clientY-dragY0);draw()});window.addEventListener('mouseup',()=>dragging=false);canvas.addEventListener('wheel',e=>{e.preventDefault();autoFit=false;const f=e.deltaY<0?1.15:.87;const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;offsetX=mx+(offsetX-mx)*f;offsetY=my+(offsetY-my)*f;scale*=f;draw()},{passive:false});document.getElementById('zoomIn').onclick=()=>{autoFit=false;scale*=1.3;draw()};document.getElementById('zoomOut').onclick=()=>{autoFit=false;scale/=1.3;draw()};document.getElementById('resetView').onclick=()=>{autoFit=true;fitView();draw()};

async function init(){resize();draw();setStatus('','Kobler til…');try{API=await TrimbleConnectWorkspace.connect(window.parent,(event,args)=>{const d=args?.data??args??{};if(String(event).toLowerCase().includes('camera')){const pos=d.position??d.eye??d.cameraPosition;const dir=d.direction??(d.target||d.lookAt?vectorFromTo(d.eye??d.position,d.target??d.lookAt):null);onCameraUpdate(pos,dir);}});setStatus('live','Tilkoblet');await loadModels();try{const cam=await API.viewer?.getCamera?.();if(cam){const pos=cam.position??cam.eye;const dir=cam.direction??(cam.target?vectorFromTo(cam.eye??cam.position,cam.target):null);onCameraUpdate(pos,dir);}}catch(_){}try{await API.viewer?.subscribeToCamera?.();}catch(_){}try{await API.viewer?.enableCameraEvents?.();}catch(_){}setTimeout(()=>{if(!hasCamera&&models2d.length===0){setStatus('error','Ingen data');overlay.classList.remove('hidden');}},3500);}catch(e){console.error('Trimble Connect feil:',e);setStatus('error','Frakoblet');document.getElementById('overlayText').innerHTML='Kunne ikke koble til Trimble Connect Workspace API.';overlay.classList.remove('hidden');}}
init();
</script>
</body>
</html>
