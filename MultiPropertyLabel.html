<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <title>Minimap – Trimble Connect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
  <style>
    :root {
      --primary: #0069d9;
      --bg: #1a1f2e;
      --panel: #222840;
      --border: #2e3650;
      --text: #e8eaf0;
      --muted: #7b82a0;
      --accent: #00d4ff;
      --danger: #ff5252;
      --success: #4caf50;
      --grid: rgba(0, 212, 255, 0.06);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex: 0 0 auto;
      gap: 8px;
    }

    .title-group {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .title-group svg { opacity: .85; flex-shrink: 0; }

    .title {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .04em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .4s;
      flex-shrink: 0;
    }
    .status-dot.live { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.error { background: var(--danger); }

    /* ── Map canvas area ── */
    .map-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #mapCanvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    /* ── Bottom info bar ── */
    .info-bar {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0;
      background: var(--panel);
      border-top: 1px solid var(--border);
      flex: 0 0 auto;
    }

    .info-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 8px;
      border-right: 1px solid var(--border);
    }
    .info-cell:last-child { border-right: none; }

    .info-label {
      font-size: 9px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .info-value {
      font-size: 13px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      margin-top: 1px;
    }

    /* ── Compass rose (top-right of map) ── */
    #compass {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 48px;
      height: 48px;
      pointer-events: none;
    }

    /* ── Controls ── */
    .controls {
      position: absolute;
      bottom: 10px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .ctrl-btn {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s;
    }
    .ctrl-btn:hover { background: var(--primary); color: #fff; }

    /* ── Level picker ── */
    .level-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
    }

    /* ── Model/filter panel ── */
    .model-panel {
      position: absolute;
      top: 10px;
      left: 10px;
      width: min(320px, calc(100% - 88px));
      background: rgba(34, 40, 64, .94);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
      z-index: 4;
    }

    #modelSelector {
      min-width: 0;
      background: #171c2b;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 8px;
      font-size: 11px;
      outline: none;
    }

    .mini-btn {
      border: 1px solid var(--border);
      background: #171c2b;
      color: var(--text);
      border-radius: 7px;
      padding: 0 9px;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
    }
    .mini-btn:hover { background: var(--primary); color: #fff; }

    .filter-row {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 10px;
      color: var(--muted);
    }

    .filter-row label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      white-space: nowrap;
    }

    .filter-row input { accent-color: #00d4ff; }

    .level-badge {
      left: auto;
      right: 66px;
      z-index: 3;
    }

    /* ── No-data overlay ── */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(26, 31, 46, .85);
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      padding: 20px;
    }
    #overlay.hidden { display: none; }

    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="title-group">
    <!-- Map pin icon -->
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/>
      <circle cx="12" cy="10" r="3"/>
    </svg>
    <span class="title">Minimap</span>
  </div>
  <div style="display:flex;align-items:center;gap:6px;">
    <span id="statusText" style="font-size:11px;color:var(--muted);">Kobler til…</span>
    <div class="status-dot" id="statusDot"></div>
  </div>
</header>

<div class="map-wrap">
  <canvas id="mapCanvas"></canvas>

  <!-- Compass -->
  <svg id="compass" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
    <circle cx="24" cy="24" r="22" fill="#1a1f2e" stroke="#2e3650" stroke-width="1.5"/>
    <!-- N arrow -->
    <polygon id="compassNeedle" points="24,5 27,24 24,20 21,24" fill="var(--accent)" opacity=".9"/>
    <polygon id="compassNeedleS" points="24,43 21,24 24,28 27,24" fill="var(--muted)" opacity=".6"/>
    <text x="24" y="14" text-anchor="middle" font-size="6" font-weight="900" fill="var(--accent)" font-family="system-ui">N</text>
  </svg>

  <!-- Model/filter panel -->
  <div class="model-panel">
    <select id="modelSelector" title="Velg modell / fil i 2D-vinduet">
      <option value="__all__">Alle modeller</option>
    </select>
    <button class="mini-btn" id="zoomModel" title="Zoom til valgt modell">Zoom</button>
    <div class="filter-row">
      <label><input type="checkbox" id="showModels" checked> Vis modeller i kart</label>
      <label><input type="checkbox" id="filterSelectedOnly"> Kun valgt modell</label>
      <span id="modelCount">0 filer</span>
    </div>
  </div>

  <!-- Level badge -->
  <div class="level-badge" id="levelBadge">Z –</div>

  <!-- Zoom controls -->
  <div class="controls">
    <button class="ctrl-btn" id="zoomIn" title="Zoom inn">+</button>
    <button class="ctrl-btn" id="zoomOut" title="Zoom ut">−</button>
    <button class="ctrl-btn" id="resetView" title="Sentrer">⊙</button>
  </div>

  <!-- Waiting overlay -->
  <div id="overlay">
    <div class="spinner"></div>
    <span>Venter på kameraposisjon<br>fra Trimble Connect…</span>
  </div>
</div>

<div class="info-bar">
  <div class="info-cell">
    <span class="info-label">X (øst)</span>
    <span class="info-value" id="valX">–</span>
  </div>
  <div class="info-cell">
    <span class="info-label">Y (nord)</span>
    <span class="info-value" id="valY">–</span>
  </div>
  <div class="info-cell">
    <span class="info-label">Retning</span>
    <span class="info-value" id="valDir">–°</span>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let API = null;
let camPos   = { x: 0, y: 0, z: 0 };   // 3D world position
let camDir   = { x: 0, y: 0, z: -1 };  // look-at direction vector
let hasData  = false;

// Map view
let scale    = 1;      // pixels per model unit
let offsetX  = 0;      // pan X (canvas px)
let offsetY  = 0;      // pan Y (canvas px)
let autoFit  = true;   // fit-to-view until user pans/zooms

// Bounding box, updated over time
let bbox = { minX: Infinity, maxX: -Infinity, minY: Infinity, maxY: -Infinity };
let modelBounds = { minX: Infinity, maxX: -Infinity, minY: Infinity, maxY: -Infinity };
let models2d = [];
let selectedModelId = "__all__";
let showModelsInMap = true;
let filterSelectedOnly = false;

// Trail
const trail = [];
const MAX_TRAIL = 200;

// Canvas
const canvas  = document.getElementById("mapCanvas");
const ctx     = canvas.getContext("2d");
const overlay = document.getElementById("overlay");

// ─────────────────────────────────────────────
//  Resize canvas
// ─────────────────────────────────────────────
function resize() {
  canvas.width  = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
  if (autoFit && hasData) fitView();
  draw();
}
const ro = new ResizeObserver(resize);
ro.observe(canvas);

// ─────────────────────────────────────────────
//  Auto-fit
// ─────────────────────────────────────────────
function hasValidBounds(b) {
  return Number.isFinite(b.minX) && Number.isFinite(b.maxX) &&
         Number.isFinite(b.minY) && Number.isFinite(b.maxY) &&
         b.maxX > b.minX && b.maxY > b.minY;
}

function getActiveBounds() {
  if (filterSelectedOnly && selectedModelId !== "__all__") {
    const m = models2d.find(x => String(x.id) === String(selectedModelId));
    if (m?.bounds && hasValidBounds(m.bounds)) return m.bounds;
  }
  if (hasValidBounds(modelBounds)) return modelBounds;
  return bbox;
}

function fitView(bounds = null) {
  const b = bounds || getActiveBounds();
  if (!hasValidBounds(b)) return;
  const pad = 60;
  const W = Math.max(canvas.width  - pad * 2, 10);
  const H = Math.max(canvas.height - pad * 2, 10);
  const mW = b.maxX - b.minX || 10;
  const mH = b.maxY - b.minY || 10;
  scale = Math.min(W / mW, H / mH, 80);
  offsetX = canvas.width  / 2 - (b.minX + mW / 2) * scale;
  offsetY = canvas.height / 2 + (b.minY + mH / 2) * scale;
}

function zoomToSelectedModel() {
  autoFit = false;
  if (selectedModelId === "__all__") fitView(modelBounds);
  else {
    const m = models2d.find(x => String(x.id) === String(selectedModelId));
    if (m?.bounds) fitView(m.bounds);
  }
  draw();
}

// ─────────────────────────────────────────────
//  World → canvas
// ─────────────────────────────────────────────
function toCanvas(wx, wy) {
  return {
    cx: wx * scale + offsetX,
    cy: -wy * scale + offsetY  // flip Y (model Y=north → canvas Y=up)
  };
}

// ─────────────────────────────────────────────
//  Draw
// ─────────────────────────────────────────────
function draw() {
  const W = canvas.width;
  const H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = "#12151f";
  ctx.fillRect(0, 0, W, H);

  // Grid
  drawGrid(W, H);

  if (!hasData) return;

  // Model footprints / filter area
  drawModels();

  // Trail
  drawTrail();

  // Camera position + FOV cone
  const { cx: px, cy: py } = toCanvas(camPos.x, camPos.y);
  drawFOV(px, py);
  drawMarker(px, py);
}

function drawGrid(W, H) {
  // Compute grid step: aim for ~40-80px spacing
  const rawStep = 80 / scale;
  const exp = Math.floor(Math.log10(rawStep));
  const nice = [1, 2, 5, 10];
  let gridStep = null;
  for (const n of nice) {
    const candidate = n * Math.pow(10, exp);
    if (candidate * scale >= 40) { gridStep = candidate; break; }
  }
  if (!gridStep) gridStep = Math.pow(10, exp + 1);

  ctx.strokeStyle = "rgba(0, 212, 255, 0.07)";
  ctx.lineWidth = 1;

  // Vertical lines
  const startX = Math.floor((-offsetX / scale) / gridStep) * gridStep;
  for (let wx = startX; wx < (W - offsetX) / scale; wx += gridStep) {
    const cx = wx * scale + offsetX;
    ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, H); ctx.stroke();
  }
  // Horizontal lines
  const startY = Math.floor(((offsetY - H) / scale) / gridStep) * gridStep;
  for (let wy = startY; wy < offsetY / scale; wy += gridStep) {
    const cy = -wy * scale + offsetY;
    ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(W, cy); ctx.stroke();
  }

  // Axis cross
  const { cx: ox, cy: oy } = toCanvas(0, 0);
  ctx.strokeStyle = "rgba(0, 212, 255, 0.18)";
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(ox, 0); ctx.lineTo(ox, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, oy); ctx.lineTo(W, oy); ctx.stroke();
  ctx.setLineDash([]);
}

function drawModels() {
  if (!showModelsInMap || !models2d.length) return;

  const visibleModels = models2d.filter(m => {
    if (!m.bounds || !hasValidBounds(m.bounds)) return false;
    if (filterSelectedOnly && selectedModelId !== "__all__") {
      return String(m.id) === String(selectedModelId);
    }
    return true;
  });

  for (const m of visibleModels) {
    const b = m.bounds;
    const p1 = toCanvas(b.minX, b.minY);
    const p2 = toCanvas(b.maxX, b.maxY);
    const x = Math.min(p1.cx, p2.cx);
    const y = Math.min(p1.cy, p2.cy);
    const w = Math.abs(p2.cx - p1.cx);
    const h = Math.abs(p2.cy - p1.cy);
    const selected = String(m.id) === String(selectedModelId);

    ctx.save();
    ctx.fillStyle = selected ? "rgba(0,212,255,0.16)" : "rgba(123,130,160,0.10)";
    ctx.strokeStyle = selected ? "rgba(0,212,255,0.95)" : "rgba(123,130,160,0.45)";
    ctx.lineWidth = selected ? 2 : 1;
    ctx.setLineDash(selected ? [] : [5, 4]);
    ctx.beginPath();
    ctx.rect(x, y, Math.max(w, 3), Math.max(h, 3));
    ctx.fill();
    ctx.stroke();
    ctx.setLineDash([]);

    if (w > 45 && h > 18) {
      ctx.fillStyle = selected ? "#00d4ff" : "rgba(232,234,240,.65)";
      ctx.font = "10px system-ui, sans-serif";
      ctx.textBaseline = "top";
      const label = (m.name || "Modell").slice(0, 36);
      ctx.fillText(label, x + 5, y + 4);
    }
    ctx.restore();
  }
}

function drawTrail() {
  if (trail.length < 2) return;
  ctx.beginPath();
  const p0 = toCanvas(trail[0].x, trail[0].y);
  ctx.moveTo(p0.cx, p0.cy);
  for (let i = 1; i < trail.length; i++) {
    const p = toCanvas(trail[i].x, trail[i].y);
    ctx.lineTo(p.cx, p.cy);
  }
  ctx.strokeStyle = "rgba(0, 212, 255, 0.3)";
  ctx.lineWidth = 1.5;
  ctx.lineJoin = "round";
  ctx.stroke();
}

function drawFOV(px, py) {
  // Heading in radians from direction vector (model: X=east, Y=north)
  const heading = Math.atan2(camDir.x, camDir.y); // 0 = north

  const fovAngle = Math.PI / 3;  // 60° FOV
  const coneLen  = 60;

  const leftAngle  = heading - fovAngle / 2;
  const rightAngle = heading + fovAngle / 2;

  // In canvas coords, north is up (Y flipped), so negate the heading Y component
  const toCanvasAngle = (a) => {
    return { dx: Math.sin(a), dy: -Math.cos(a) };
  };

  const lv = toCanvasAngle(leftAngle);
  const rv = toCanvasAngle(rightAngle);

  ctx.beginPath();
  ctx.moveTo(px, py);
  ctx.lineTo(px + lv.dx * coneLen, py + lv.dy * coneLen);
  ctx.arc(px, py, coneLen, Math.atan2(lv.dy, lv.dx), Math.atan2(rv.dy, rv.dx));
  ctx.closePath();

  const grad = ctx.createRadialGradient(px, py, 0, px, py, coneLen);
  grad.addColorStop(0, "rgba(0,212,255,0.35)");
  grad.addColorStop(1, "rgba(0,212,255,0.0)");
  ctx.fillStyle = grad;
  ctx.fill();

  // Boresight line
  const bv = toCanvasAngle(heading);
  ctx.beginPath();
  ctx.moveTo(px, py);
  ctx.lineTo(px + bv.dx * coneLen * 0.85, py + bv.dy * coneLen * 0.85);
  ctx.strokeStyle = "rgba(0,212,255,0.7)";
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function drawMarker(px, py) {
  // Camera icon, rotated by current heading
  const heading = Math.atan2(camDir.x, camDir.y);

  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(heading);

  // View direction nose
  ctx.beginPath();
  ctx.moveTo(0, -16);
  ctx.lineTo(7, -3);
  ctx.lineTo(0, -7);
  ctx.lineTo(-7, -3);
  ctx.closePath();
  ctx.fillStyle = "rgba(0,212,255,0.95)";
  ctx.fill();

  // Camera body
  ctx.beginPath();
  ctx.roundRect(-8, -3, 16, 12, 3);
  ctx.fillStyle = "#00d4ff";
  ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,.55)";
  ctx.lineWidth = 1;
  ctx.stroke();

  // Lens
  ctx.beginPath();
  ctx.arc(0, 3, 3, 0, Math.PI * 2);
  ctx.fillStyle = "#12151f";
  ctx.fill();

  ctx.restore();

  // Static glow ring
  ctx.beginPath();
  ctx.arc(px, py, 15, 0, Math.PI * 2);
  ctx.strokeStyle = "rgba(0,212,255,0.18)";
  ctx.lineWidth = 3;
  ctx.stroke();
}

// ─────────────────────────────────────────────
//  Compass
// ─────────────────────────────────────────────
function updateCompass() {
  // Heading angle from north, in degrees
  const heading = Math.atan2(camDir.x, camDir.y) * (180 / Math.PI);
  const needle  = document.getElementById("compassNeedle");
  const needleS = document.getElementById("compassNeedleS");
  // Rotate so needle points toward current heading
  needle.setAttribute("transform",  `rotate(${heading}, 24, 24)`);
  needleS.setAttribute("transform", `rotate(${heading}, 24, 24)`);
}

// ─────────────────────────────────────────────
//  Info bar
// ─────────────────────────────────────────────
function updateInfo() {
  document.getElementById("valX").textContent = camPos.x.toFixed(1);
  document.getElementById("valY").textContent = camPos.y.toFixed(1);

  const deg = ((Math.atan2(camDir.x, camDir.y) * 180 / Math.PI) + 360) % 360;
  document.getElementById("valDir").textContent = deg.toFixed(0) + "°";

  // Cardinal
  const cardinals = ["N","NØ","Ø","SØ","S","SV","V","NV"];
  const idx = Math.round(deg / 45) % 8;
  document.getElementById("valDir").title = cardinals[idx];
}

// ─────────────────────────────────────────────
//  Apply new camera data
// ─────────────────────────────────────────────
function onCameraUpdate(position, direction) {
  if (!position) return;

  camPos = {
    x: position.x ?? 0,
    y: position.y ?? 0,
    z: position.z ?? 0
  };

  if (direction) {
    camDir = {
      x: direction.x ?? 0,
      y: direction.y ?? 0,
      z: direction.z ?? -1
    };
    // Normalise
    const len = Math.sqrt(camDir.x**2 + camDir.y**2 + camDir.z**2) || 1;
    camDir.x /= len; camDir.y /= len; camDir.z /= len;
  }

  // Update bbox
  if (camPos.x < bbox.minX) bbox.minX = camPos.x;
  if (camPos.x > bbox.maxX) bbox.maxX = camPos.x;
  if (camPos.y < bbox.minY) bbox.minY = camPos.y;
  if (camPos.y > bbox.maxY) bbox.maxY = camPos.y;

  // Trail
  trail.push({ x: camPos.x, y: camPos.y });
  if (trail.length > MAX_TRAIL) trail.shift();

  // Level badge (use Z if meaningful)
  const floorZ = Math.round(camPos.z);
  document.getElementById("levelBadge").textContent = `Z: ${floorZ.toFixed(1)} m`;

  if (!hasData) {
    hasData = true;
    overlay.classList.add("hidden");
    fitView();
  }

  if (autoFit) fitView();
  updateInfo();
  updateCompass();
  draw();

  // Status
  setStatus("live", "Live");
}

// ─────────────────────────────────────────────
//  Status helper
// ─────────────────────────────────────────────
function setStatus(type, text) {
  const dot  = document.getElementById("statusDot");
  const span = document.getElementById("statusText");
  dot.className  = "status-dot" + (type ? " " + type : "");
  span.textContent = text;
}

// ─────────────────────────────────────────────
//  Pan & zoom
// ─────────────────────────────────────────────
let dragging = false, dragX0 = 0, dragY0 = 0, off0X = 0, off0Y = 0;

canvas.addEventListener("mousedown", e => {
  dragging = true; autoFit = false;
  dragX0 = e.clientX; dragY0 = e.clientY;
  off0X = offsetX; off0Y = offsetY;
});
window.addEventListener("mousemove", e => {
  if (!dragging) return;
  offsetX = off0X + (e.clientX - dragX0);
  offsetY = off0Y + (e.clientY - dragY0);
  draw();
});
window.addEventListener("mouseup", () => { dragging = false; });

canvas.addEventListener("wheel", e => {
  e.preventDefault();
  autoFit = false;
  const factor = e.deltaY < 0 ? 1.15 : 0.87;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  offsetX = mx + (offsetX - mx) * factor;
  offsetY = my + (offsetY - my) * factor;
  scale *= factor;
  draw();
}, { passive: false });

// Touch
let lastTouchDist = null;
canvas.addEventListener("touchstart", e => {
  if (e.touches.length === 1) {
    dragging = true; autoFit = false;
    dragX0 = e.touches[0].clientX; dragY0 = e.touches[0].clientY;
    off0X = offsetX; off0Y = offsetY;
  }
  if (e.touches.length === 2) {
    dragging = false;
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });
canvas.addEventListener("touchmove", e => {
  if (e.touches.length === 1 && dragging) {
    offsetX = off0X + (e.touches[0].clientX - dragX0);
    offsetY = off0Y + (e.touches[0].clientY - dragY0);
    draw();
  }
  if (e.touches.length === 2 && lastTouchDist !== null) {
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const factor = d / lastTouchDist;
    lastTouchDist = d;
    scale *= factor;
    draw();
  }
}, { passive: true });
canvas.addEventListener("touchend", () => { dragging = false; lastTouchDist = null; });

document.getElementById("zoomIn").addEventListener("click",  () => { autoFit = false; scale *= 1.3; draw(); });
document.getElementById("zoomOut").addEventListener("click", () => { autoFit = false; scale /= 1.3; draw(); });
document.getElementById("resetView").addEventListener("click", () => {
  autoFit = true;
  if (hasData) fitView();
  draw();
});


// ─────────────────────────────────────────────
//  Models / file selector / bounding boxes
// ─────────────────────────────────────────────
function normaliseBounds(raw) {
  if (!raw) return null;
  const min = raw.min ?? raw.minimum ?? raw.minPoint ?? raw.boxMin ?? raw[0];
  const max = raw.max ?? raw.maximum ?? raw.maxPoint ?? raw.boxMax ?? raw[1];
  if (!min || !max) return null;
  const b = {
    minX: Number(min.x ?? min.X ?? min[0]),
    maxX: Number(max.x ?? max.X ?? max[0]),
    minY: Number(min.y ?? min.Y ?? min[1]),
    maxY: Number(max.y ?? max.Y ?? max[1])
  };
  return hasValidBounds(b) ? b : null;
}

function mergeBounds(target, b) {
  if (!b || !hasValidBounds(b)) return;
  target.minX = Math.min(target.minX, b.minX);
  target.maxX = Math.max(target.maxX, b.maxX);
  target.minY = Math.min(target.minY, b.minY);
  target.maxY = Math.max(target.maxY, b.maxY);
}

async function getModelBounds(model) {
  const candidates = [
    () => API.viewer?.getObjectBoundingBox?.(model.id),
    () => API.viewer?.getObjectBoundingBox?.([model.id]),
    () => API.viewer?.getModelBoundingBox?.(model.id),
    () => API.viewer?.getBoundingBox?.(model.id),
    () => API.viewer?.models?.getBoundingBox?.(model.id)
  ];

  for (const fn of candidates) {
    try {
      const result = await fn();
      const b = normaliseBounds(result?.data ?? result);
      if (b) return b;
    } catch (_) { }
  }

  return null;
}

async function loadModels() {
  const select = document.getElementById("modelSelector");
  const count = document.getElementById("modelCount");
  if (!API?.viewer) return;

  let rawModels = [];
  const candidates = [
    () => API.viewer.getModels?.(),
    () => API.viewer.models?.getAll?.(),
    () => API.viewer.getLoadedModels?.()
  ];

  for (const fn of candidates) {
    try {
      const res = await fn();
      rawModels = res?.data ?? res ?? [];
      if (Array.isArray(rawModels) && rawModels.length) break;
    } catch (_) { }
  }

  models2d = [];
  modelBounds = { minX: Infinity, maxX: -Infinity, minY: Infinity, maxY: -Infinity };

  for (const raw of rawModels) {
    const id = raw.id ?? raw.modelId ?? raw.objectId ?? raw.guid ?? raw.fileId;
    if (!id) continue;
    const name = raw.name ?? raw.modelName ?? raw.fileName ?? raw.displayName ?? String(id);
    const bounds = normaliseBounds(raw.boundingBox ?? raw.bounds ?? raw.bbox) || await getModelBounds({ id });
    const model = { id, name, bounds };
    models2d.push(model);
    mergeBounds(modelBounds, bounds);
  }

  select.innerHTML = `<option value="__all__">Alle modeller</option>`;
  for (const m of models2d) {
    const opt = document.createElement("option");
    opt.value = m.id;
    opt.textContent = m.bounds ? m.name : `${m.name} (uten bbox)`;
    select.appendChild(opt);
  }

  count.textContent = `${models2d.length} fil${models2d.length === 1 ? "" : "er"}`;

  if (hasValidBounds(modelBounds)) {
    hasData = true;
    overlay.classList.add("hidden");
    autoFit = true;
    fitView(modelBounds);
    draw();
  }
}

document.getElementById("modelSelector").addEventListener("change", e => {
  selectedModelId = e.target.value;
  if (filterSelectedOnly) zoomToSelectedModel();
  draw();
});

document.getElementById("zoomModel").addEventListener("click", zoomToSelectedModel);
document.getElementById("showModels").addEventListener("change", e => {
  showModelsInMap = e.target.checked;
  draw();
});
document.getElementById("filterSelectedOnly").addEventListener("change", e => {
  filterSelectedOnly = e.target.checked;
  if (filterSelectedOnly) zoomToSelectedModel();
  else draw();
});

// ─────────────────────────────────────────────
//  Trimble Connect init
// ─────────────────────────────────────────────
async function init() {
  setStatus("", "Kobler til…");

  try {
    API = await TrimbleConnectWorkspace.connect(window.parent, async (event, args) => {
      // Camera events – try common event names
      if (
        event === "viewer.camera" ||
        event === "viewer.cameraChanged" ||
        event === "camera.changed" ||
        event === "extension.camera"
      ) {
        const d = args?.data ?? args;
        const pos = d?.position ?? d?.eye ?? d?.cameraPosition;
        const dir = d?.direction ?? d?.lookAt ?? d?.target
          ? vectorFromTo(d.eye ?? d.position, d.target ?? d.lookAt)
          : d?.direction;

        onCameraUpdate(pos, dir);
      }
    });

    // Try to get current camera state immediately
    try {
      const cam = await API.viewer?.getCamera?.();
      if (cam) {
        const pos = cam.position ?? cam.eye;
        const dir = cam.direction ?? (cam.target ? vectorFromTo(cam.eye ?? cam.position, cam.target) : null);
        onCameraUpdate(pos, dir);
      }
    } catch (_) { /* API may not support getCamera */ }

    // Request camera updates / subscribe
    try { await API.viewer?.subscribeToCamera?.(); } catch (_) {}
    try { await API.viewer?.enableCameraEvents?.(); } catch (_) {}

    await loadModels();

    setStatus("live", "Tilkoblet");
    startDemoIfNoData();

  } catch (err) {
    console.error("Trimble Connect feil:", err);
    setStatus("error", "Frakoblet – demo");
    startDemo();
  }
}

// ─────────────────────────────────────────────
//  Helper: direction vector from two points
// ─────────────────────────────────────────────
function vectorFromTo(from, to) {
  if (!from || !to) return null;
  return {
    x: (to.x ?? 0) - (from.x ?? 0),
    y: (to.y ?? 0) - (from.y ?? 0),
    z: (to.z ?? 0) - (from.z ?? 0)
  };
}

// ─────────────────────────────────────────────
//  Demo mode: animate a camera walking around
// ─────────────────────────────────────────────
let demoTimer = null;

function startDemoIfNoData() {
  // If no real data after 3 s, start demo
  setTimeout(() => {
    if (!hasData) {
      setStatus("", "Demo-modus");
      startDemo();
    }
  }, 3000);
}

function startDemo() {
  if (!models2d.length) {
    models2d = [
      { id: "demo_veg", name: "Demo Vegmodell", bounds: { minX: -22, maxX: 22, minY: -9, maxY: 9 } },
      { id: "demo_va", name: "Demo VA-modell", bounds: { minX: -8, maxX: 30, minY: -18, maxY: -11 } }
    ];
    modelBounds = { minX: Infinity, maxX: -Infinity, minY: Infinity, maxY: -Infinity };
    models2d.forEach(m => mergeBounds(modelBounds, m.bounds));
    const select = document.getElementById("modelSelector");
    select.innerHTML = `<option value="__all__">Alle modeller</option>`;
    models2d.forEach(m => {
      const opt = document.createElement("option");
      opt.value = m.id; opt.textContent = m.name; select.appendChild(opt);
    });
    document.getElementById("modelCount").textContent = `${models2d.length} filer`;
    fitView(modelBounds);
  }
  let t = 0;
  const R = 15;
  demoTimer = setInterval(() => {
    t += 0.03;
    // Walk in a figure-8
    const x = R * Math.sin(t);
    const y = R * Math.sin(t * 2) / 2;
    const z = 3 + Math.sin(t * 0.5);

    // Direction tangent
    const dx = R * Math.cos(t);
    const dy = R * Math.cos(t * 2);
    const len = Math.sqrt(dx**2 + dy**2) || 1;

    onCameraUpdate({ x, y, z }, { x: dx/len, y: dy/len, z: 0 });
  }, 100);
}

// ─────────────────────────────────────────────
//  Boot
// ─────────────────────────────────────────────
resize();
draw();
init();
</script>
