<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <title>Dynamisk kart-minimap – Trimble Connect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
  <style>
    :root{--primary:#1a73e8;--bg:#10131b;--panel:#20263a;--border:#313a56;--text:#f1f3f4;--muted:#9aa0a6;--accent:#00d4ff;--danger:#ff5252;--success:#4caf50;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
    *{box-sizing:border-box;margin:0;padding:0}body{height:100vh;background:var(--bg);color:var(--text);display:flex;flex-direction:column;overflow:hidden;user-select:none}
    header{height:30px;display:flex;align-items:center;justify-content:space-between;padding:5px 9px;background:rgba(32,38,58,.96);border-bottom:1px solid var(--border);gap:8px;flex:0 0 auto}.title-group{display:flex;align-items:center;gap:7px}.title{font-size:12px;font-weight:900;letter-spacing:.05em;color:var(--accent);text-transform:uppercase}.status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}.status-dot.live{background:var(--success);box-shadow:0 0 6px var(--success)}.status-dot.error{background:var(--danger)}
    .map-wrap{flex:1;position:relative;overflow:hidden;background:#111}#mapCanvas{position:absolute;inset:0;display:block;width:100%;height:100%;z-index:1;cursor:grab}.map-wrap.dragging #mapCanvas{cursor:grabbing}
    .model-panel{position:absolute;top:10px;left:10px;width:min(560px,calc(100% - 88px));background:rgba(32,38,58,.95);border:1px solid var(--border);border-radius:10px;padding:8px;display:grid;grid-template-columns:1fr auto auto auto auto;gap:6px;z-index:5;box-shadow:0 8px 24px rgba(0,0,0,.28)}
    #modelSelector{min-width:0;background:#141927;color:var(--text);border:1px solid var(--border);border-radius:7px;padding:6px 8px;font-size:11px;outline:none}.mini-btn{border:1px solid var(--border);background:#141927;color:var(--text);border-radius:7px;padding:0 9px;font-size:11px;font-weight:800;cursor:pointer;min-height:28px}.mini-btn:hover{background:var(--primary);color:#fff}.filter-row{grid-column:1/-1;display:flex;align-items:center;gap:12px;font-size:10px;color:var(--muted);flex-wrap:wrap}.filter-row label{display:flex;align-items:center;gap:4px;white-space:nowrap}.filter-row input{accent-color:var(--accent)}#modelCount{margin-left:auto;font-weight:800;color:var(--muted)}
    .map-badge{position:absolute;top:10px;right:58px;background:rgba(32,38,58,.95);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:800;color:var(--accent);z-index:4}.controls{position:absolute;right:10px;bottom:10px;display:flex;flex-direction:column;gap:4px;z-index:4}.ctrl-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:rgba(32,38,58,.95);color:var(--text);font-size:15px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center}.ctrl-btn:hover{background:var(--primary);color:#fff}
    #compass{position:absolute;top:10px;right:10px;width:40px;height:40px;pointer-events:none;z-index:4}.info-bar{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--panel);border-top:1px solid var(--border);flex:0 0 auto}.info-cell{display:flex;flex-direction:column;align-items:center;padding:6px 8px;border-right:1px solid var(--border)}.info-cell:last-child{border-right:none}.info-label{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}.info-value{font-size:13px;font-weight:900;font-variant-numeric:tabular-nums;color:var(--accent);margin-top:1px}
    #overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(16,19,27,.40);gap:10px;font-size:12px;color:var(--text);text-align:center;padding:20px;z-index:3;pointer-events:none}.hidden{display:none!important}.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<header>
  <div class="title-group"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l4 20-4-3-4 3 4-20z"/></svg><span class="title">Street View Minimap</span></div>
  <div style="display:flex;align-items:center;gap:6px"><span id="statusText" style="font-size:11px;color:var(--muted)">Kobler til…</span><div class="status-dot" id="statusDot"></div></div>
</header>
<div class="map-wrap" id="mapWrap">
  <canvas id="mapCanvas"></canvas>
  <div class="model-panel">
    <select id="modelSelector"><option value="__all__">Laster modeller…</option></select>
    <button class="mini-btn" id="refreshModels" title="Hent modeller på nytt">↻</button>
    <button class="mini-btn" id="zoomModel" title="Zoom til valgt modell">Zoom</button>
    <button class="mini-btn" id="centerCamera" title="Sentrer kart på kamera">Kamera</button>
    <button class="mini-btn" id="calibrate" title="Koble modellens lokale koordinater til kartets senter">Kalibrer</button>
    <div class="filter-row">
      <label><input type="checkbox" id="showModels" checked> Vis modeller</label>
      <label><input type="checkbox" id="selectedOnly"> Kun valgt modell</label>
      <label><input type="checkbox" id="followCamera" checked> Følg kamera</label>
      <label><input type="checkbox" id="satellite" checked> Satellitt</label>
      <span id="modelCount">0 filer</span>
    </div>
  </div>
  <svg id="compass" viewBox="0 0 48 48"><circle cx="24" cy="24" r="22" fill="#20263a" stroke="#313a56" stroke-width="1.5"/><polygon id="compassNeedle" points="24,5 27,24 24,20 21,24" fill="var(--accent)" opacity=".95"/><polygon id="compassNeedleS" points="24,43 21,24 24,28 27,24" fill="var(--muted)" opacity=".65"/><text x="24" y="14" text-anchor="middle" font-size="6" font-weight="900" fill="var(--accent)" font-family="system-ui">N</text></svg>
  <div class="map-badge" id="mapBadge">Kart</div>
  <div class="controls"><button class="ctrl-btn" id="zoomIn">+</button><button class="ctrl-btn" id="zoomOut">−</button><button class="ctrl-btn" id="resetView">⊙</button></div>
  <div id="overlay"><div class="spinner"></div><span id="overlayText">Venter på kamera/modeller<br>fra Trimble Connect…</span></div>
</div>
<div class="info-bar"><div class="info-cell"><span class="info-label">Lat</span><span class="info-value" id="valLat">–</span></div><div class="info-cell"><span class="info-label">Lon</span><span class="info-value" id="valLon">–</span></div><div class="info-cell"><span class="info-label">Retning</span><span class="info-value" id="valDir">–°</span></div></div>
<script>
let API=null;
let camPos={x:0,y:0,z:0}, camDir={x:0,y:1,z:0}, hasCamera=false;
let models2d=[], selectedModelId='__all__', showModels=true, selectedOnly=false, followCamera=true, satellite=true;
let zoom=18, mapCenter={lat:59.7380059, lon:10.2107246};
const baseGeo={lat:59.7380059, lon:10.2107246};
let modelOrigin=null; // Used only when model coordinates are local, not UTM32.
const trail=[], MAX_TRAIL=160, tileCache=new Map();
const canvas=document.getElementById('mapCanvas'), ctx=canvas.getContext('2d'), overlay=document.getElementById('overlay'), mapWrap=document.getElementById('mapWrap');

function setStatus(type,text){document.getElementById('statusDot').className='status-dot'+(type?' '+type:'');document.getElementById('statusText').textContent=text;}
function resize(){canvas.width=canvas.clientWidth;canvas.height=canvas.clientHeight;draw();} new ResizeObserver(resize).observe(canvas);
function clamp(n,a,b){return Math.max(a,Math.min(b,n));}
function clampLat(lat){return clamp(lat,-85,85);}
function project(lat,lon,z=zoom){const sin=Math.sin(clampLat(lat)*Math.PI/180), n=256*Math.pow(2,z);return{x:(lon+180)/360*n,y:(0.5-Math.log((1+sin)/(1-sin))/(4*Math.PI))*n};}
function unproject(x,y,z=zoom){const n=256*Math.pow(2,z), lon=x/n*360-180, lat=Math.atan(Math.sinh(Math.PI*(1-2*y/n)))*180/Math.PI;return{lat,lon};}
function geoToCanvas(lat,lon){const c=project(mapCenter.lat,mapCenter.lon), p=project(lat,lon);return{cx:canvas.width/2+(p.x-c.x),cy:canvas.height/2+(p.y-c.y)};}
function canvasToGeo(cx,cy){const c=project(mapCenter.lat,mapCenter.lon);return unproject(c.x+(cx-canvas.width/2),c.y+(cy-canvas.height/2));}
function isLikelyUTM32(x,y){return x>200000&&x<900000&&y>6300000&&y<8000000;}
function utm32ToLatLon(E,N){const a=6378137,f=1/298.257223563,k0=0.9996,e=Math.sqrt(f*(2-f)),e1=(1-Math.sqrt(1-e*e))/(1+Math.sqrt(1-e*e));const x=E-500000,y=N,lon0=9*Math.PI/180;const M=y/k0,mu=M/(a*(1-e*e/4-3*e**4/64-5*e**6/256));const fp=mu+(3*e1/2-27*e1**3/32)*Math.sin(2*mu)+(21*e1**2/16-55*e1**4/32)*Math.sin(4*mu)+(151*e1**3/96)*Math.sin(6*mu)+(1097*e1**4/512)*Math.sin(8*mu);const C1=(e*e/(1-e*e))*Math.cos(fp)**2,T1=Math.tan(fp)**2,R1=a*(1-e*e)/Math.pow(1-e*e*Math.sin(fp)**2,1.5),N1=a/Math.sqrt(1-e*e*Math.sin(fp)**2),D=x/(N1*k0);const lat=fp-(N1*Math.tan(fp)/R1)*(D**2/2-(5+3*T1+10*C1-4*C1**2-9*(e*e/(1-e*e)))*D**4/24+(61+90*T1+298*C1+45*T1**2-252*(e*e/(1-e*e))-3*C1**2)*D**6/720);const lon=lon0+(D-(1+2*T1+C1)*D**3/6+(5-2*C1+28*T1-3*C1**2+8*(e*e/(1-e*e))+24*T1**2)*D**5/120)/Math.cos(fp);return{lat:lat*180/Math.PI,lon:lon*180/Math.PI};}
function metersToLatLon(dx,dy,origin){const lat=origin.lat+dy/111320;const lon=origin.lon+dx/(111320*Math.cos(origin.lat*Math.PI/180));return{lat,lon};}
function ensureOriginFromPoint(x,y){if(!modelOrigin && !isLikelyUTM32(x,y)){modelOrigin={x,y,lat:baseGeo.lat,lon:baseGeo.lon};}}
function localToLatLon(x,y){x=Number(x)||0;y=Number(y)||0;if(isLikelyUTM32(x,y))return utm32ToLatLon(x,y);ensureOriginFromPoint(x,y);return metersToLatLon(x-modelOrigin.x,y-modelOrigin.y,modelOrigin);}
function updateBadge(){document.getElementById('mapBadge').textContent=(satellite?'Esri satellitt':'OpenStreetMap')+' · z'+zoom;}
function tileURL(z,x,y){return satellite?`https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/${z}/${y}/${x}`:`https://tile.openstreetmap.org/${z}/${x}/${y}.png`;}
function loadTile(z,x,y){const key=(satellite?'s':'o')+`/${z}/${x}/${y}`;if(tileCache.has(key))return tileCache.get(key);const img=new Image();img.crossOrigin='anonymous';img.src=tileURL(z,x,y);img.onload=draw;img.onerror=draw;tileCache.set(key,img);return img;}
function drawTiles(){ctx.fillStyle='#10131b';ctx.fillRect(0,0,canvas.width,canvas.height);const z=Math.round(zoom), center=project(mapCenter.lat,mapCenter.lon,z), left=center.x-canvas.width/2, top=center.y-canvas.height/2;const minX=Math.floor(left/256), maxX=Math.floor((left+canvas.width)/256), minY=Math.floor(top/256), maxY=Math.floor((top+canvas.height)/256), maxTile=Math.pow(2,z);for(let ty=minY;ty<=maxY;ty++){if(ty<0||ty>=maxTile)continue;for(let tx=minX;tx<=maxX;tx++){const wx=((tx%maxTile)+maxTile)%maxTile, img=loadTile(z,wx,ty), dx=Math.round(tx*256-left), dy=Math.round(ty*256-top);if(img.complete&&img.naturalWidth>0)ctx.drawImage(img,dx,dy,256,256);else{ctx.fillStyle='#151b2a';ctx.fillRect(dx,dy,256,256);}}}ctx.fillStyle='rgba(5,8,13,.18)';ctx.fillRect(0,0,canvas.width,canvas.height);}
function draw(){if(!ctx)return;updateBadge();drawTiles();drawScale();if(showModels)drawModels();drawTrail();if(hasCamera){const g=localToLatLon(camPos.x,camPos.y), p=geoToCanvas(g.lat,g.lon);drawFOV(p.cx,p.cy);drawStreetViewCamera(p.cx,p.cy);}}
function drawScale(){const p1=canvasToGeo(30,canvas.height-34), p2=canvasToGeo(130,canvas.height-34);const m=distanceMeters(p1,p2);const nice=niceDistance(m);const px=100*nice/m;ctx.save();ctx.strokeStyle='rgba(255,255,255,.9)';ctx.fillStyle='rgba(255,255,255,.95)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(30,canvas.height-30);ctx.lineTo(30+px,canvas.height-30);ctx.stroke();ctx.font='11px system-ui';ctx.fillText(nice>=1000?(nice/1000)+' km':nice+' m',30,canvas.height-38);ctx.restore();}
function distanceMeters(a,b){const R=6371000, p1=a.lat*Math.PI/180,p2=b.lat*Math.PI/180,dp=(b.lat-a.lat)*Math.PI/180,dl=(b.lon-a.lon)*Math.PI/180;const h=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;return 2*R*Math.asin(Math.sqrt(h));}
function niceDistance(m){const exp=Math.floor(Math.log10(m||1)), base=Math.pow(10,exp);for(const n of [1,2,5,10])if(n*base>=m*.45)return n*base;return base;}
function validBounds(b){return b&&isFinite(b.minX)&&isFinite(b.maxX)&&isFinite(b.minY)&&isFinite(b.maxY)&&Math.abs(b.maxX-b.minX)>0.001&&Math.abs(b.maxY-b.minY)>0.001;}
function boundsGeo(b){if(!validBounds(b))return null;const p=[localToLatLon(b.minX,b.minY),localToLatLon(b.minX,b.maxY),localToLatLon(b.maxX,b.minY),localToLatLon(b.maxX,b.maxY)];return{minLat:Math.min(...p.map(q=>q.lat)),maxLat:Math.max(...p.map(q=>q.lat)),minLon:Math.min(...p.map(q=>q.lon)),maxLon:Math.max(...p.map(q=>q.lon))};}
function projectBounds(){let r=null;for(const m of models2d){if(!validBounds(m.bounds))continue;if(!r)r={...m.bounds};else{r.minX=Math.min(r.minX,m.bounds.minX);r.minY=Math.min(r.minY,m.bounds.minY);r.maxX=Math.max(r.maxX,m.bounds.maxX);r.maxY=Math.max(r.maxY,m.bounds.maxY)}}return r;}
function drawModels(){const list=selectedOnly&&selectedModelId!=='__all__'?models2d.filter(m=>m.id===selectedModelId):models2d;for(const m of list){const gb=boundsGeo(m.bounds);if(!gb)continue;const p1=geoToCanvas(gb.minLat,gb.minLon), p2=geoToCanvas(gb.maxLat,gb.maxLon);const x=Math.min(p1.cx,p2.cx), y=Math.min(p1.cy,p2.cy), w=Math.abs(p2.cx-p1.cx), h=Math.abs(p2.cy-p1.cy), sel=m.id===selectedModelId;ctx.save();ctx.fillStyle=sel?'rgba(0,212,255,.26)':'rgba(0,212,255,.13)';ctx.strokeStyle=sel?'rgba(0,212,255,1)':'rgba(0,212,255,.75)';ctx.lineWidth=sel?3:2;ctx.setLineDash(sel?[]:[8,5]);ctx.beginPath();ctx.rect(x,y,Math.max(w,7),Math.max(h,7));ctx.fill();ctx.stroke();ctx.setLineDash([]);if(w>48&&h>16){ctx.font='11px system-ui';ctx.fillStyle='rgba(255,255,255,.96)';ctx.fillText(shortName(m.name),x+5,y+14)}ctx.restore();}}
function drawTrail(){if(trail.length<2)return;ctx.beginPath();let p=geoToCanvas(trail[0].lat,trail[0].lon);ctx.moveTo(p.cx,p.cy);for(let i=1;i<trail.length;i++){p=geoToCanvas(trail[i].lat,trail[i].lon);ctx.lineTo(p.cx,p.cy)}ctx.strokeStyle='rgba(0,212,255,.9)';ctx.lineWidth=2.5;ctx.stroke();}
function drawFOV(px,py){const heading=Math.atan2(camDir.x,camDir.y), fov=Math.PI/3, len=74;const v=a=>({dx:Math.sin(a),dy:-Math.cos(a)}), l=v(heading-fov/2), r=v(heading+fov/2), b=v(heading);ctx.save();ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+l.dx*len,py+l.dy*len);ctx.arc(px,py,len,Math.atan2(l.dy,l.dx),Math.atan2(r.dy,r.dx));ctx.closePath();const g=ctx.createRadialGradient(px,py,0,px,py,len);g.addColorStop(0,'rgba(26,115,232,.48)');g.addColorStop(1,'rgba(26,115,232,0)');ctx.fillStyle=g;ctx.fill();ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+b.dx*len*.85,py+b.dy*len*.85);ctx.strokeStyle='rgba(0,212,255,1)';ctx.lineWidth=2.5;ctx.stroke();ctx.restore();}
function drawStreetViewCamera(px,py){ctx.save();ctx.translate(px,py);ctx.beginPath();ctx.arc(0,0,15,0,Math.PI*2);ctx.fillStyle='rgba(26,115,232,.98)';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.stroke();ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.beginPath();ctx.moveTo(-7,14);ctx.lineTo(0,27);ctx.lineTo(7,14);ctx.closePath();ctx.fillStyle='rgba(26,115,232,.98)';ctx.fill();ctx.strokeStyle='#fff';ctx.stroke();ctx.restore();}
function updateCompass(){const h=Math.atan2(camDir.x,camDir.y)*180/Math.PI;document.getElementById('compassNeedle').setAttribute('transform',`rotate(${h},24,24)`);document.getElementById('compassNeedleS').setAttribute('transform',`rotate(${h},24,24)`)}
function updateInfo(){if(!hasCamera){document.getElementById('valLat').textContent='–';document.getElementById('valLon').textContent='–';document.getElementById('valDir').textContent='–°';return}const g=localToLatLon(camPos.x,camPos.y);document.getElementById('valLat').textContent=g.lat.toFixed(6);document.getElementById('valLon').textContent=g.lon.toFixed(6);const deg=((Math.atan2(camDir.x,camDir.y)*180/Math.PI)+360)%360;document.getElementById('valDir').textContent=deg.toFixed(0)+'°'}
function onCameraUpdate(position,direction){if(!position)return;camPos={x:Number(position.x??0),y:Number(position.y??0),z:Number(position.z??0)};ensureOriginFromPoint(camPos.x,camPos.y);if(direction){camDir={x:Number(direction.x??0),y:Number(direction.y??1),z:Number(direction.z??0)};const l=Math.hypot(camDir.x,camDir.y,camDir.z)||1;camDir.x/=l;camDir.y/=l;camDir.z/=l}hasCamera=true;const g=localToLatLon(camPos.x,camPos.y);trail.push(g);if(trail.length>MAX_TRAIL)trail.shift();overlay.classList.add('hidden');if(followCamera)mapCenter=g;updateInfo();updateCompass();draw();setStatus('live','Live')}
function vectorFromTo(from,to){if(!from||!to)return null;return{x:(to.x??0)-(from.x??0),y:(to.y??0)-(from.y??0),z:(to.z??0)-(from.z??0)}}
async function tryCalls(calls){for(const fn of calls){try{const v=await fn();if(v!==undefined&&v!==null)return v}catch(e){console.warn('API-forsøk feilet:',e?.message||e)}}return null}
function asArray(v){if(!v)return[];if(Array.isArray(v))return v;if(Array.isArray(v.models))return v.models;if(Array.isArray(v.data))return v.data;if(Array.isArray(v.items))return v.items;if(Array.isArray(v.files))return v.files;return[]}
function normaliseBounds(raw){if(!raw)return null;const min=raw.min||raw.minimum||raw.low||raw.Min||raw.minPoint||raw.min_point;const max=raw.max||raw.maximum||raw.high||raw.Max||raw.maxPoint||raw.max_point;if(min&&max)return{minX:Number(min.x??min.X??min[0]),maxX:Number(max.x??max.X??max[0]),minY:Number(min.y??min.Y??min[1]),maxY:Number(max.y??max.Y??max[1])};if(['minX','maxX','minY','maxY'].every(k=>raw[k]!==undefined))return{minX:Number(raw.minX),maxX:Number(raw.maxX),minY:Number(raw.minY),maxY:Number(raw.maxY)};if(raw.boundingBox)return normaliseBounds(raw.boundingBox);if(raw.bbox)return normaliseBounds(raw.bbox);if(raw.bounds)return normaliseBounds(raw.bounds);return null}
function modelId(m){return String(m.id??m.modelId??m.fileId??m.documentId??m.guid??m.name??Math.random())}function modelName(m){return String(m.name??m.fileName??m.displayName??m.title??m.modelName??modelId(m))}function shortName(n){return String(n||'Modell').replace(/\.[^.]+$/,'').slice(0,44)}
async function loadModels(){if(!API)return;setStatus('','Henter modeller…');const raw=await tryCalls([()=>API.viewer?.getModels?.(),()=>API.viewer?.models?.getModels?.(),()=>API.project?.getModels?.(),()=>API.viewer?.getLoadedModels?.(),()=>API.viewer?.getObjects?.()]);const arr=asArray(raw);models2d=[];for(const m of arr){const id=modelId(m), name=modelName(m);let b=normaliseBounds(m);if(!validBounds(b)){const bb=await tryCalls([()=>API.viewer?.getObjectBoundingBox?.(id),()=>API.viewer?.getModelBoundingBox?.(id),()=>API.viewer?.getBoundingBox?.(id),()=>API.viewer?.models?.getBoundingBox?.(id),()=>API.viewer?.getObjectsBoundingBox?.([id])]);b=normaliseBounds(bb)}models2d.push({id,name,bounds:b})}const pb=projectBounds();if(validBounds(pb)){ensureOriginFromPoint((pb.minX+pb.maxX)/2,(pb.minY+pb.maxY)/2);zoomToGeoBounds(boundsGeo(pb));overlay.classList.add('hidden');setStatus('live','Modeller lastet')}else{setStatus('live','Tilkoblet');document.getElementById('overlayText').innerHTML='Finner modeller, men ikke bounding box.<br>Prøv Kalibrer eller velg modell og Zoom.'}fillModelSelector();draw()}
function fillModelSelector(){const s=document.getElementById('modelSelector');s.innerHTML='<option value="__all__">Alle modeller</option>';let withBbox=0;for(const m of models2d){if(validBounds(m.bounds))withBbox++;const o=document.createElement('option');o.value=m.id;o.textContent=(validBounds(m.bounds)?'✓ ':'• ')+m.name;s.appendChild(o)}s.value=selectedModelId;document.getElementById('modelCount').textContent=`${models2d.length} filer · ${withBbox} bbox`}
function zoomToGeoBounds(gb){if(!gb)return false;const pad=60;let z=21;for(;z>=10;z--){const a=project(gb.minLat,gb.minLon,z), b=project(gb.maxLat,gb.maxLon,z);if(Math.abs(b.x-a.x)<=canvas.width-pad*2 && Math.abs(b.y-a.y)<=canvas.height-pad*2)break}zoom=clamp(z,10,21);mapCenter={lat:(gb.minLat+gb.maxLat)/2,lon:(gb.minLon+gb.maxLon)/2};followCamera=false;document.getElementById('followCamera').checked=false;draw();return true}
function zoomToSelected(){let b=null;if(selectedModelId==='__all__')b=projectBounds();else{const m=models2d.find(x=>x.id===selectedModelId);b=m?.bounds}if(validBounds(b)&&zoomToGeoBounds(boundsGeo(b)))return; if(hasCamera){centerOnCamera();setStatus('live','Zoomet til kamera');}else setStatus('error','Mangler bbox')}
function centerOnCamera(){if(!hasCamera)return;mapCenter=localToLatLon(camPos.x,camPos.y);zoom=Math.max(zoom,18);draw()}
function calibrate(){let anchor=null;if(hasCamera)anchor={x:camPos.x,y:camPos.y};else{let b=selectedModelId==='__all__'?projectBounds():models2d.find(m=>m.id===selectedModelId)?.bounds;if(validBounds(b))anchor={x:(b.minX+b.maxX)/2,y:(b.minY+b.maxY)/2}}if(!anchor){setStatus('error','Kan ikke kalibrere');return}modelOrigin={x:anchor.x,y:anchor.y,lat:mapCenter.lat,lon:mapCenter.lon};trail.length=0;setStatus('live','Kalibrert mot kart');draw()}
async function init(){setStatus('','Kobler til…');draw();try{API=await TrimbleConnectWorkspace.connect(window.parent,async(event,args)=>{if(['viewer.camera','viewer.cameraChanged','camera.changed','extension.camera'].includes(event)){const d=args?.data??args;const pos=d?.position??d?.eye??d?.cameraPosition;const dir=(d?.target||d?.lookAt)?vectorFromTo(d.eye??d.position,d.target??d.lookAt):d?.direction;onCameraUpdate(pos,dir)}});try{const cam=await API.viewer?.getCamera?.();if(cam){onCameraUpdate(cam.position??cam.eye,cam.direction??(cam.target?vectorFromTo(cam.eye??cam.position,cam.target):null))}}catch(_){}try{await API.viewer?.subscribeToCamera?.()}catch(_){}try{await API.viewer?.enableCameraEvents?.()}catch(_){}await loadModels();setTimeout(()=>{if(!hasCamera&&!models2d.some(m=>validBounds(m.bounds))){document.getElementById('overlayText').innerHTML='Tilkoblet, men mottar ikke kamera/bbox.<br>Trimble API returnerer ikke nok geometri til minikartet.'}},3500)}catch(e){console.error(e);setStatus('error','Frakoblet');document.getElementById('overlayText').innerHTML='Fikk ikke kontakt med Trimble Connect.<br>Kartet vises uten modellkobling.'}}
canvas.addEventListener('wheel',e=>{e.preventDefault();zoom=clamp(zoom+(e.deltaY<0?1:-1),10,21);followCamera=false;document.getElementById('followCamera').checked=false;draw()},{passive:false});
let drag=false,start=null,startCenter=null;canvas.addEventListener('mousedown',e=>{drag=true;mapWrap.classList.add('dragging');start={x:e.clientX,y:e.clientY};startCenter={...mapCenter};followCamera=false;document.getElementById('followCamera').checked=false});window.addEventListener('mousemove',e=>{if(!drag)return;const c=project(startCenter.lat,startCenter.lon);mapCenter=unproject(c.x-(e.clientX-start.x),c.y-(e.clientY-start.y));draw()});window.addEventListener('mouseup',()=>{drag=false;mapWrap.classList.remove('dragging')});
document.getElementById('zoomIn').onclick=()=>{zoom=clamp(zoom+1,10,21);followCamera=false;document.getElementById('followCamera').checked=false;draw()};document.getElementById('zoomOut').onclick=()=>{zoom=clamp(zoom-1,10,21);followCamera=false;document.getElementById('followCamera').checked=false;draw()};document.getElementById('resetView').onclick=()=>{if(hasCamera){followCamera=true;document.getElementById('followCamera').checked=true;centerOnCamera()}else zoomToSelected()};document.getElementById('zoomModel').onclick=zoomToSelected;document.getElementById('centerCamera').onclick=()=>{followCamera=true;document.getElementById('followCamera').checked=true;centerOnCamera()};document.getElementById('refreshModels').onclick=loadModels;document.getElementById('calibrate').onclick=calibrate;document.getElementById('modelSelector').onchange=e=>{selectedModelId=e.target.value;draw()};document.getElementById('showModels').onchange=e=>{showModels=e.target.checked;draw()};document.getElementById('selectedOnly').onchange=e=>{selectedOnly=e.target.checked;draw()};document.getElementById('followCamera').onchange=e=>{followCamera=e.target.checked;if(followCamera&&hasCamera)centerOnCamera()};document.getElementById('satellite').onchange=e=>{satellite=e.target.checked;tileCache.clear();draw()};
resize();init();
</script>
</body>
</html>
