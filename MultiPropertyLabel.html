<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <title>ACC-style 2D Minimap – Trimble Connect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
  <style>
    :root{--bg:#10131b;--panel:#20263a;--panel2:#151a28;--border:#313a56;--text:#f1f3f4;--muted:#9aa0a6;--accent:#00d4ff;--accent2:#3aa6ff;--danger:#ff5252;--success:#4caf50;--warn:#ffb020;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
    *{box-sizing:border-box;margin:0;padding:0} body{height:100vh;background:var(--bg);color:var(--text);display:flex;flex-direction:column;overflow:hidden;user-select:none}
    header{height:30px;display:flex;align-items:center;justify-content:space-between;padding:5px 9px;background:rgba(32,38,58,.98);border-bottom:1px solid var(--border);gap:8px;flex:0 0 auto}.title-group{display:flex;align-items:center;gap:7px}.title{font-size:12px;font-weight:900;letter-spacing:.05em;color:var(--accent);text-transform:uppercase}.status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}.status-dot.live{background:var(--success);box-shadow:0 0 6px var(--success)}.status-dot.error{background:var(--danger)}.status-dot.warn{background:var(--warn)}
    .map-wrap{flex:1;position:relative;overflow:hidden;background:#11151f}.map-wrap.dragging #mapCanvas{cursor:grabbing}#mapCanvas{position:absolute;inset:0;display:block;width:100%;height:100%;cursor:grab}
    .toolbar{position:absolute;top:10px;left:10px;width:min(620px,calc(100% - 84px));background:rgba(32,38,58,.96);border:1px solid var(--border);border-radius:10px;padding:8px;display:grid;grid-template-columns:1fr auto auto auto auto;gap:6px;z-index:5;box-shadow:0 8px 24px rgba(0,0,0,.28)}
    #modelSelector{min-width:0;background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:6px 8px;font-size:11px;outline:none}.mini-btn{border:1px solid var(--border);background:var(--panel2);color:var(--text);border-radius:7px;padding:0 9px;font-size:11px;font-weight:800;cursor:pointer;min-height:28px}.mini-btn:hover{background:#1a73e8;color:#fff}.mini-btn.active{background:#0d4f73;border-color:var(--accent);color:#fff}.filter-row{grid-column:1/-1;display:flex;align-items:center;gap:12px;font-size:10px;color:var(--muted);flex-wrap:wrap}.filter-row label{display:flex;align-items:center;gap:4px;white-space:nowrap}.filter-row input{accent-color:var(--accent)}#modelCount{margin-left:auto;font-weight:800;color:var(--muted)}
    .badge{position:absolute;top:10px;right:58px;background:rgba(32,38,58,.96);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:800;color:var(--accent);z-index:4}.controls{position:absolute;right:10px;bottom:10px;display:flex;flex-direction:column;gap:4px;z-index:4}.ctrl-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:rgba(32,38,58,.96);color:var(--text);font-size:15px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center}.ctrl-btn:hover{background:#1a73e8;color:#fff}
    #compass{position:absolute;top:10px;right:10px;width:40px;height:40px;pointer-events:none;z-index:4}.info-bar{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--panel);border-top:1px solid var(--border);flex:0 0 auto}.info-cell{display:flex;flex-direction:column;align-items:center;padding:6px 8px;border-right:1px solid var(--border)}.info-cell:last-child{border-right:none}.info-label{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}.info-value{font-size:13px;font-weight:900;font-variant-numeric:tabular-nums;color:var(--accent);margin-top:1px}
    #overlay{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);max-width:430px;background:rgba(32,38,58,.94);border:1px solid var(--border);border-radius:12px;padding:14px 16px;z-index:3;font-size:12px;color:var(--text);text-align:center;line-height:1.45;box-shadow:0 10px 30px rgba(0,0,0,.35)}.hidden{display:none!important}.hint{color:var(--muted);font-size:11px;margin-top:8px}
  </style>
</head>
<body>
<header>
  <div class="title-group"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6l6-3 6 3 6-3v15l-6 3-6-3-6 3V6z"/><path d="M9 3v15M15 6v15"/></svg><span class="title">ACC 2D Minimap</span></div>
  <div style="display:flex;align-items:center;gap:6px"><span id="statusText" style="font-size:11px;color:var(--muted)">Kobler til…</span><div class="status-dot" id="statusDot"></div></div>
</header>
<div class="map-wrap" id="mapWrap">
  <canvas id="mapCanvas"></canvas>
  <div class="toolbar">
    <select id="modelSelector"><option value="__all__">Laster modeller…</option></select>
    <button class="mini-btn" id="refreshModels" title="Hent modeller på nytt">↻</button>
    <button class="mini-btn" id="zoomModel" title="Zoom til valgt modell eller alle modeller">Zoom</button>
    <button class="mini-btn" id="centerCamera" title="Sentrer på ståsted">Ståsted</button>
    <button class="mini-btn active" id="followBtn" title="Følg kamera">Følg</button>
    <div class="filter-row">
      <label><input type="checkbox" id="showModels" checked> Vis modellomriss</label>
      <label><input type="checkbox" id="selectedOnly"> Kun valgt modell</label>
      <label><input type="checkbox" id="showTrail" checked> Vis spor</label>
      <label><input type="checkbox" id="showGrid" checked> Rutenett</label>
      <span id="modelCount">0 filer</span>
    </div>
  </div>
  <div class="badge" id="levelBadge">Z: –</div>
  <svg id="compass" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="24" r="22" fill="#151a28" stroke="#313a56" stroke-width="1.5"/><polygon id="compassNeedle" points="24,5 27,24 24,20 21,24" fill="var(--accent)" opacity=".95"/><polygon id="compassNeedleS" points="24,43 21,24 24,28 27,24" fill="var(--muted)" opacity=".55"/><text x="24" y="14" text-anchor="middle" font-size="6" font-weight="900" fill="var(--accent)" font-family="system-ui">N</text></svg>
  <div class="controls"><button class="ctrl-btn" id="zoomIn">+</button><button class="ctrl-btn" id="zoomOut">−</button><button class="ctrl-btn" id="resetView">⊙</button></div>
  <div id="overlay">Venter på modellutstrekning og kameraposisjon…<div class="hint">Minikartet viser modellene som 2D-omriss når Trimble Connect gir bounding box. Kameraikonet viser ståsted og synsretning.</div></div>
</div>
<div class="info-bar"><div class="info-cell"><span class="info-label">X / Øst</span><span class="info-value" id="valX">–</span></div><div class="info-cell"><span class="info-label">Y / Nord</span><span class="info-value" id="valY">–</span></div><div class="info-cell"><span class="info-label">Retning</span><span class="info-value" id="valDir">–°</span></div></div>
<script>
let API=null;let hasCamera=false;let camPos={x:0,y:0,z:0};let camDir={x:0,y:1,z:0};let scale=1,offsetX=0,offsetY=0;let followCamera=true;let models=[];let selectedModelId="__all__";let trail=[];const MAX_TRAIL=400;const canvas=document.getElementById('mapCanvas'),ctx=canvas.getContext('2d'),mapWrap=document.getElementById('mapWrap'),overlay=document.getElementById('overlay');
function setStatus(type,text){document.getElementById('statusDot').className='status-dot'+(type?' '+type:'');document.getElementById('statusText').textContent=text}
function resize(){canvas.width=canvas.clientWidth;canvas.height=canvas.clientHeight;draw()} new ResizeObserver(resize).observe(canvas);
function finite(n){return Number.isFinite(n)} function normBox(b){if(!b)return null;let min=b.min||b.minimum||b.minPoint||b.Min||b.boxMin;let max=b.max||b.maximum||b.maxPoint||b.Max||b.boxMax;if(!min&&Array.isArray(b)&&b.length>=2){min=b[0];max=b[1]} if(!min||!max)return null;const out={minX:+(min.x??min.X),minY:+(min.y??min.Y),minZ:+(min.z??min.Z??0),maxX:+(max.x??max.X),maxY:+(max.y??max.Y),maxZ:+(max.z??max.Z??0)}; if([out.minX,out.minY,out.maxX,out.maxY].every(finite)&&out.maxX!==out.minX&&out.maxY!==out.minY)return out; return null}
function merge(a,b){if(!b)return a; if(!a)return {...b}; return {minX:Math.min(a.minX,b.minX),minY:Math.min(a.minY,b.minY),minZ:Math.min(a.minZ||0,b.minZ||0),maxX:Math.max(a.maxX,b.maxX),maxY:Math.max(a.maxY,b.maxY),maxZ:Math.max(a.maxZ||0,b.maxZ||0)}}
function getVisibleModels(){let arr=models.filter(m=>m.bbox); if(document.getElementById('selectedOnly').checked&&selectedModelId!=='__all__')arr=arr.filter(m=>String(m.id)===String(selectedModelId)); return arr}
function projectBounds(){let b=null; for(const m of getVisibleModels())b=merge(b,m.bbox); if(!b&&hasCamera)b={minX:camPos.x-25,minY:camPos.y-25,maxX:camPos.x+25,maxY:camPos.y+25,minZ:camPos.z,maxZ:camPos.z}; return b}
function fitToBox(b){if(!b)return false; const pad=55,W=Math.max(20,canvas.width-pad*2),H=Math.max(20,canvas.height-pad*2),mW=Math.max(1,b.maxX-b.minX),mH=Math.max(1,b.maxY-b.minY); scale=Math.min(W/mW,H/mH); const cx=(b.minX+b.maxX)/2,cy=(b.minY+b.maxY)/2; offsetX=canvas.width/2-cx*scale; offsetY=canvas.height/2+cy*scale; draw(); return true}
function toCanvas(x,y){return{cx:x*scale+offsetX,cy:-y*scale+offsetY}} function fromCanvas(cx,cy){return{x:(cx-offsetX)/scale,y:-(cy-offsetY)/scale}}
function draw(){const W=canvas.width,H=canvas.height;ctx.clearRect(0,0,W,H);ctx.fillStyle='#11151f';ctx.fillRect(0,0,W,H); if(document.getElementById('showGrid').checked)drawGrid(W,H); if(document.getElementById('showModels').checked)drawModels(); if(document.getElementById('showTrail').checked)drawTrail(); if(hasCamera){const p=toCanvas(camPos.x,camPos.y);drawCamera(p.cx,p.cy)} const hasModel=getVisibleModels().length>0; overlay.classList.toggle('hidden',hasModel||hasCamera)}
function drawGrid(W,H){const raw=90/scale; const exp=Math.floor(Math.log10(Math.max(raw,.001))); const nice=[1,2,5,10]; let step=nice.map(n=>n*Math.pow(10,exp)).find(v=>v*scale>=45)||Math.pow(10,exp+1); ctx.strokeStyle='rgba(0,212,255,.07)';ctx.lineWidth=1;let sx=Math.floor((-offsetX/scale)/step)*step;for(let x=sx;x<(W-offsetX)/scale;x+=step){const p=x*scale+offsetX;ctx.beginPath();ctx.moveTo(p,0);ctx.lineTo(p,H);ctx.stroke()}let sy=Math.floor(((offsetY-H)/scale)/step)*step;for(let y=sy;y<offsetY/scale;y+=step){const p=-y*scale+offsetY;ctx.beginPath();ctx.moveTo(0,p);ctx.lineTo(W,p);ctx.stroke()}ctx.setLineDash([4,4]);ctx.strokeStyle='rgba(0,212,255,.18)';const o=toCanvas(0,0);ctx.beginPath();ctx.moveTo(o.cx,0);ctx.lineTo(o.cx,H);ctx.stroke();ctx.beginPath();ctx.moveTo(0,o.cy);ctx.lineTo(W,o.cy);ctx.stroke();ctx.setLineDash([])}
function drawModels(){const arr=getVisibleModels(); arr.forEach((m,i)=>{const b=m.bbox,p1=toCanvas(b.minX,b.minY),p2=toCanvas(b.maxX,b.maxY); const x=Math.min(p1.cx,p2.cx),y=Math.min(p1.cy,p2.cy),w=Math.abs(p2.cx-p1.cx),h=Math.abs(p2.cy-p1.cy); const sel=String(m.id)===String(selectedModelId); ctx.fillStyle=sel?'rgba(0,212,255,.18)':'rgba(58,166,255,.08)';ctx.strokeStyle=sel?'rgba(0,212,255,.95)':'rgba(58,166,255,.55)';ctx.lineWidth=sel?2.2:1.2;ctx.fillRect(x,y,w,h);ctx.strokeRect(x,y,w,h); if(w>45&&h>14){ctx.fillStyle=sel?'#e8fbff':'rgba(241,243,244,.75)';ctx.font='10px system-ui';ctx.textBaseline='top';ctx.fillText((m.name||m.id||'modell').slice(0,46),x+5,y+4)}})}
function drawTrail(){if(trail.length<2)return;ctx.beginPath();let p=toCanvas(trail[0].x,trail[0].y);ctx.moveTo(p.cx,p.cy);for(let i=1;i<trail.length;i++){p=toCanvas(trail[i].x,trail[i].y);ctx.lineTo(p.cx,p.cy)}ctx.strokeStyle='rgba(0,212,255,.28)';ctx.lineWidth=1.5;ctx.stroke()}
function drawCamera(px,py){const heading=Math.atan2(camDir.x,camDir.y),len=70,spread=Math.PI/5; const v=a=>({dx:Math.sin(a),dy:-Math.cos(a)});const l=v(heading-spread),r=v(heading+spread),c=v(heading);ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+l.dx*len,py+l.dy*len);ctx.lineTo(px+c.dx*len*1.08,py+c.dy*len*1.08);ctx.lineTo(px+r.dx*len,py+r.dy*len);ctx.closePath();const g=ctx.createRadialGradient(px,py,0,px,py,len);g.addColorStop(0,'rgba(0,212,255,.40)');g.addColorStop(1,'rgba(0,212,255,0)');ctx.fillStyle=g;ctx.fill();ctx.strokeStyle='rgba(0,212,255,.45)';ctx.stroke(); ctx.save();ctx.translate(px,py);ctx.rotate(heading);ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(9,9);ctx.lineTo(0,5);ctx.lineTo(-9,9);ctx.closePath();ctx.fillStyle='#00d4ff';ctx.strokeStyle='#06131c';ctx.lineWidth=2;ctx.stroke();ctx.fill();ctx.restore();ctx.beginPath();ctx.arc(px,py,16,0,Math.PI*2);ctx.strokeStyle='rgba(0,212,255,.22)';ctx.lineWidth=4;ctx.stroke()}
function updateInfo(){document.getElementById('valX').textContent=camPos.x.toFixed(1);document.getElementById('valY').textContent=camPos.y.toFixed(1);const deg=((Math.atan2(camDir.x,camDir.y)*180/Math.PI)+360)%360;document.getElementById('valDir').textContent=deg.toFixed(0)+'°';document.getElementById('levelBadge').textContent='Z: '+camPos.z.toFixed(1)+' m';document.getElementById('compassNeedle').setAttribute('transform',`rotate(${deg},24,24)`);document.getElementById('compassNeedleS').setAttribute('transform',`rotate(${deg},24,24)`)}
function onCameraUpdate(pos,dir){if(!pos)return;camPos={x:+(pos.x??pos.X??0),y:+(pos.y??pos.Y??0),z:+(pos.z??pos.Z??0)}; if(dir){camDir={x:+(dir.x??dir.X??0),y:+(dir.y??dir.Y??1),z:+(dir.z??dir.Z??0)};const L=Math.hypot(camDir.x,camDir.y,camDir.z)||1;camDir.x/=L;camDir.y/=L;camDir.z/=L}hasCamera=true;trail.push({x:camPos.x,y:camPos.y});if(trail.length>MAX_TRAIL)trail.shift(); if(followCamera){const p=toCanvas(camPos.x,camPos.y);offsetX+=canvas.width/2-p.cx;offsetY+=canvas.height/2-p.cy}updateInfo();draw();setStatus('live','Live')}
function vFromTo(a,b){if(!a||!b)return null;return{x:(b.x??b.X??0)-(a.x??a.X??0),y:(b.y??b.Y??0)-(a.y??a.Y??0),z:(b.z??b.Z??0)-(a.z??a.Z??0)}}
async function tryBox(id){const calls=[()=>API.viewer?.getObjectBoundingBox?.(id),()=>API.viewer?.getModelBoundingBox?.(id),()=>API.viewer?.getBoundingBox?.(id),()=>API.viewer?.models?.getBoundingBox?.(id),()=>API.models?.getBoundingBox?.(id)]; for(const c of calls){try{const b=normBox(await c()); if(b)return b}catch(e){}}return null}
async function loadModels(){const sel=document.getElementById('modelSelector');sel.innerHTML='<option value="__all__">Alle modeller</option>';models=[];let raw=[];const calls=[()=>API.viewer?.getModels?.(),()=>API.viewer?.models?.getModels?.(),()=>API.models?.getModels?.(),()=>API.project?.getModels?.()]; for(const c of calls){try{const r=await c(); if(Array.isArray(r)){raw=r;break} if(Array.isArray(r?.models)){raw=r.models;break} if(Array.isArray(r?.data)){raw=r.data;break}}catch(e){}} for(const item of raw){const id=item.id??item.modelId??item.guid??item.identifier??item.objectId; const name=item.name??item.fileName??item.title??String(id); if(id===undefined||id===null)continue; const bbox=normBox(item.boundingBox||item.bbox||item.bounds)||await tryBox(id); models.push({id,name,bbox}); const opt=document.createElement('option');opt.value=String(id);opt.textContent=bbox?name:`${name} (mangler 2D)`;sel.appendChild(opt)}document.getElementById('modelCount').textContent=`${models.length} filer`; if(models.some(m=>m.bbox)){fitToBox(projectBounds());setStatus('live','Tilkoblet')}else{setStatus('warn','Ingen modellomriss');draw()}}
async function init(){setStatus('', 'Kobler til…');try{API=await TrimbleConnectWorkspace.connect(window.parent,async(event,args)=>{if(['viewer.camera','viewer.cameraChanged','camera.changed','extension.camera'].includes(event)){const d=args?.data??args;const pos=d?.position??d?.eye??d?.cameraPosition;const dir=d?.direction??(d?.target||d?.lookAt?vFromTo(d.eye??d.position,d.target??d.lookAt):null);onCameraUpdate(pos,dir)}}); await loadModels(); try{const cam=await API.viewer?.getCamera?.();if(cam){onCameraUpdate(cam.position??cam.eye,cam.direction??(cam.target?vFromTo(cam.eye??cam.position,cam.target):null))}}catch(e){} try{await API.viewer?.subscribeToCamera?.()}catch(e){} try{await API.viewer?.enableCameraEvents?.()}catch(e){} if(!hasCamera&&!models.some(m=>m.bbox))setStatus('warn','Venter på data')}catch(e){console.error(e);setStatus('error','Frakoblet');draw()}}
let dragging=false,x0=0,y0=0,ox0=0,oy0=0;canvas.addEventListener('mousedown',e=>{dragging=true;followCamera=false;document.getElementById('followBtn').classList.remove('active');mapWrap.classList.add('dragging');x0=e.clientX;y0=e.clientY;ox0=offsetX;oy0=offsetY});window.addEventListener('mousemove',e=>{if(!dragging)return;offsetX=ox0+e.clientX-x0;offsetY=oy0+e.clientY-y0;draw()});window.addEventListener('mouseup',()=>{dragging=false;mapWrap.classList.remove('dragging')});canvas.addEventListener('wheel',e=>{e.preventDefault();followCamera=false;document.getElementById('followBtn').classList.remove('active');const f=e.deltaY<0?1.15:.87,rect=canvas.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;offsetX=mx+(offsetX-mx)*f;offsetY=my+(offsetY-my)*f;scale*=f;draw()},{passive:false});
document.getElementById('zoomIn').onclick=()=>{scale*=1.25;draw()};document.getElementById('zoomOut').onclick=()=>{scale/=1.25;draw()};document.getElementById('resetView').onclick=()=>fitToBox(projectBounds());document.getElementById('refreshModels').onclick=loadModels;document.getElementById('modelSelector').onchange=e=>{selectedModelId=e.target.value;draw()};document.getElementById('zoomModel').onclick=()=>{let b=null;if(selectedModelId!=='__all__'){const m=models.find(x=>String(x.id)===String(selectedModelId));b=m?.bbox||null}else b=projectBounds(); if(!fitToBox(b)&&hasCamera){fitToBox({minX:camPos.x-25,minY:camPos.y-25,maxX:camPos.x+25,maxY:camPos.y+25,minZ:camPos.z,maxZ:camPos.z})}};document.getElementById('centerCamera').onclick=()=>{if(!hasCamera)return;const p=toCanvas(camPos.x,camPos.y);offsetX+=canvas.width/2-p.cx;offsetY+=canvas.height/2-p.cy;draw()};document.getElementById('followBtn').onclick=e=>{followCamera=!followCamera;e.currentTarget.classList.toggle('active',followCamera);if(followCamera)document.getElementById('centerCamera').click()};['showModels','selectedOnly','showTrail','showGrid'].forEach(id=>document.getElementById(id).addEventListener('change',draw));
resize();draw();init();
</script>
</body>
</html>
